name: Publish images

# Builds + pushes the backend and frontend images to GitHub Container Registry so
# customers can pull and self-host. Runs on pushes to main (tags `latest` + commit sha)
# and on version tags `vX.Y.Z` (tags the semver). Trigger manually via "Run workflow".
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: eigg-prevent-backend
            context: ./backend
            file: ./backend/Dockerfile
            build_args: ""
          - image: eigg-prevent-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            # Same-origin deployment behind nginx — browser calls /api/v1.
            build_args: NEXT_PUBLIC_API_URL=
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
