# EIGG Prevent — self-host (image-based). No source checkout needed: this pulls the
# published images from GitHub Container Registry. Copy .env.example -> .env, fill it in,
# then:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-eigg}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-eigg_prevent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eigg} -d ${DB_NAME:-eigg_prevent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    image: ghcr.io/jimandgeorge/eigg-prevent-backend:${IMAGE_TAG:-latest}
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-eigg}:${DB_PASSWORD}@db:5432/${DB_NAME:-eigg_prevent}
      DB_SSL: "false"
      APP_BASE_URL: ${PUBLIC_URL}
      CORS_ORIGINS: ${PUBLIC_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-EIGG <noreply@eigg.io>}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: ghcr.io/jimandgeorge/eigg-prevent-frontend:${IMAGE_TAG:-latest}
    environment:
      NEXTAUTH_URL: ${PUBLIC_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      API_URL: http://backend:8001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      # For HTTPS, uncomment and drop your cert into ./certs (see nginx.conf):
      # - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
