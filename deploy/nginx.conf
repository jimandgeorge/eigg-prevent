# EIGG Prevent — single-host reverse proxy.
# Routes /api/v1 + /health to the backend; everything else (pages, NextAuth, admin
# proxy) to the frontend. Serves HTTP on :80 by default. For TLS, uncomment the 443
# server block, mount ./certs in docker-compose.yml, and point the cert paths below.

upstream eigg_backend  { server backend:8001; }
upstream eigg_frontend { server frontend:3001; }

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    location /api/v1/ {
        proxy_pass http://eigg_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health { proxy_pass http://eigg_backend; }
    location / {
        proxy_pass http://eigg_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

