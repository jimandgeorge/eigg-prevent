# EIGG Prevent — prevent.eigg.io
# Routing rule: /api/v1/* and /health go to the FastAPI backend; everything else
# (Next.js pages, /api/auth NextAuth, /api/admin proxy, /invite, /admin) goes to
# the frontend. The distinct /api/v1 backend prefix is what keeps them from colliding.

upstream eigg_backend  { server backend:8001; }
upstream eigg_frontend { server frontend:3001; }

# HTTP — ACME challenge + redirect to HTTPS.
server {
    listen 80;
    server_name prevent.eigg.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name prevent.eigg.io;

    ssl_certificate     /etc/letsencrypt/live/prevent.eigg.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prevent.eigg.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Evidence file uploads.
    client_max_body_size 25m;

    # Backend API.
    location /api/v1/ {
        proxy_pass http://eigg_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Infra health probe.
    location /health {
        proxy_pass http://eigg_backend;
    }

    # Frontend (Next.js) — pages + NextAuth (/api/auth) + admin proxy (/api/admin).
    location / {
        proxy_pass http://eigg_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
